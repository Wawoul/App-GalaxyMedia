# Galaxy Media - nginx site config for LAN-only installs (plain HTTP).
# Installed to /etc/nginx/sites-available/galaxy-media by install.sh (mode: lan).
# For anything reachable from the internet use nginx-galaxy.conf (TLS) instead.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; script-src 'self'" always;
    server_tokens off;

    client_max_body_size 512m;   # keep in sync with MAX_UPLOAD_MB

    # Admin UI (static build)
    root /opt/galaxy-media/admin/dist;
    index index.html;
    location / {
        try_files $uri /index.html;
    }

    # API + WebSocket
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;  # long-lived device websockets
    }
}
